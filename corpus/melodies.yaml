# Crux Test Corpus: Monophonic Diatonic Melodies
#
# Each melody is a flat Mot string with diatonic scale-degree steps
# relative to the tonic (step 0 = tonic). The pitchRegime field specifies
# the scale/mode, and tonic is the MIDI note number of the tonic pitch.
# TimeScale 1 = the prevailing beat unit (usually a quarter note).
# For 12Tone regimes, steps are chromatic semitones (12 per octave).
#
# Categories: bach, folk, classical, chant, edm, minimalist

melodies:

  # ---------------------------------------------------------------------------
  # FOLK / TRADITIONAL
  # ---------------------------------------------------------------------------

  - id: mary-had-a-little-lamb
    name: "Mary Had a Little Lamb"
    source: "American nursery rhyme"
    category: folk
    key: "C major"
    pitchRegime: Pentatonic
    tonic: 60
    crux: |
      // #pitchRegime Pentatonic
      // #tonic 0
      [2, 1, 0, 1, 2, 2, 2 | 2, 1, 1, 1 | 2, 2, 3, 3 | 2, 2, 1, 0, 1, 2, 2, 2, 2, 1, 1, 2, 1, 0 | 2]
    notes: "Full melody, 4 phrases. 3-note melodic range (C-D-E). Phrase endings use double duration."

